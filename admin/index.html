<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCanteen - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/index_admin.css"> 
</head>
<body>
  
<!-- Sidebar -->
<div class="sidebar">
  <img src="../assets/img/smartcanteenLogo.png" alt="SmartCanteen logo" class="logo d-block mx-auto">
  <a href="index.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="users.html"><i class="bi bi-people"></i> Manage Users</a>
  <a href="menu.html"><i class="bi bi-journal-text"></i> Manage Menu</a>
  <a href="orders.html"><i class="bi bi-receipt"></i> Orders</a>

  <!-- Profile Section (always at bottom now) -->
  <div class="profile-bar d-flex justify-content-between align-items-center bg-light rounded shadow-sm">
    <div class="d-flex align-items-center">
      <a href="profile.html"><img src="../assets/img/user_avatar.png" alt="Profile" class="rounded-circle me-3" width="50" height="50"></a>
      <div>
        <h6 class="mb-0"><span id="profileName"></span></h6>
        <small class="text-muted" id="profileRole"></small>
      </div>
    </div>
    <a href="../login.html" class="logout text-danger"><i class="bi bi-box-arrow-right"></i></a>
  </div>
</div>

<!-- Content -->
<div class="content">
  <div class="topbar">
    <h5>Welcome back, <span id="adminName"></span></h5>
    <i class="bi bi-bell-fill fs-4 text-secondary"></i>
  </div>

  <!-- Dashboard Stats -->
  <div class="row mt-4 g-4">
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>👤 Total Users</h6>
        <h3>56</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>🛒 Active Orders</h6>
        <h3>18</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>🍽️ Menu Items</h6>
        <h3>34</h3>
      </div>
    </div>
  </div>

  <!-- Quick Overview Table -->
  <div class="card card-custom mt-4">
    <div class="card-header recentcard text-white fw-bold">
      Recent User Activity
    </div>
    <div class="card-body ">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>User</th>
            <th>Action</th>
            <th>Role</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Juan Dela Cruz</td>
            <td>Placed an order</td>
            <td>Customer</td>
            <td>10:15 AM</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Maria Santos</td>
            <td>Updated menu</td>
            <td>Manager</td>
            <td>11:00 AM</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const firstName  = localStorage.getItem("first_name") || "";
  const middleName = localStorage.getItem("middle_name") || "";
  const lastName   = localStorage.getItem("last_name") || "";
  const suffix     = localStorage.getItem("suffix") || "";
  const role       = localStorage.getItem("role") || "Admin";

  // Build full name (firstname + middlename + lastname + suffix)
  const fullName = `${firstName}${middleName ? " " + middleName : ""} ${lastName}${suffix ? " " + suffix : ""}`.trim();

  // Topbar welcome (first name only for friendlier greeting)
  document.getElementById("adminName").textContent = firstName || "Admin";

  // Profile section (always full name + role)
  document.getElementById("profileName").textContent = fullName;
  document.getElementById("profileRole").textContent = role;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
