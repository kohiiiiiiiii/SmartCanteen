<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCanteen - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/index_admin.css"> <!-- separate admin CSS -->
</head>
<body>

<div class="sidebar">
  <img src="../assets/img/smartcanteenLogo.png" alt="SmartCanteen logo" class="logo d-block mx-auto">
  <a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="users.html"><i class="bi bi-people"></i> Manage Users</a>
  <a href="menu.html"><i class="bi bi-journal-text"></i> Manage Menu</a>
  <a href="orders.html"><i class="bi bi-receipt"></i> Orders</a>
  <a href="../customer/index.html" class="logout"><i class="bi bi-box-arrow-right"></i> Go Home</a>
</div>

<!-- Content -->
<div class="content">
  <!-- Topbar -->
  <div class="topbar d-flex justify-content-between align-items-center">
    <h5>Manage Menu</h5>
    <div>
      <i class="bi bi-bell-fill fs-4 text-secondary"></i>
    </div>
  </div>
  
  <button class="btn btn-success mt-3 d-block mx-auto" data-bs-toggle="modal" data-bs-target="#addMenuModal">
    <i class="bi bi-plus-circle"></i> Add Menu Item
  </button>

  <!-- Add Menu Item Modal -->
  <div class="modal fade" id="addMenuModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <form action="add_menu.php" method="POST" enctype="multipart/form-data" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Menu Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Item Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <select name="category" class="form-select" required>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="snacks">Snacks</option>
                <option value="beverages">Beverages</option>
              </select>
            </div>
            <div class="col-md-12">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control" rows="2" required></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label">Price (₱)</label>
              <input type="number" name="price" step="0.01" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock</label>
              <input type="number" name="stock" class="form-control" required>
            </div>
            <div class="col-md-12">
              <label class="form-label">Upload Image</label>
              <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-warning">Add Item</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // ✅ Highlight active sidebar link
  const currentPage = window.location.pathname.split("/").pop();
  document.querySelectorAll(".sidebar a").forEach(link => {
    if (link.getAttribute("href") === currentPage) {
      link.classList.add("active");
    }
  });

  // ✅ Load admin name from localStorage
  const adminName = localStorage.getItem("first_name") || "Admin";
  document.getElementById("adminName").textContent = adminName;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
