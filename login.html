<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCanteen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a href="index.html" class="nav-link active"><img src="assets/img/smartcanteen_logo.png" alt="SmartCanteen logo" class="logo"></a>
        <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
            <div class="navbar-nav padding">
                <a href="index.html" class="nav-link homecolor">Home</a>
                <a href="#" class="nav-link profilecolor">Profile</a>
                <a href="#" class="nav-link aboutcolor">About</a>
            </div>
            <div class="navbar-nav position-relative">
                <a href="#" class="nav-link" id="notifBell" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-bell-fill padding2 color"></i>
                </a>
                <div class="dropdown-menu dropdown-menu-end p-3" aria-labelledby="notifBell">
                    <h6 class="dropdown-header notifcolor">Notifications</h6>
                    <hr>
                </div>
                <a href="login.html" class="nav-link logincolor">Login</a>
            </div>
        </div>
    </div>
</nav>

<div class="login justify-content-center align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card p-4">
                    <img src="assets/img/smartcanteen_logo.png" alt="SmartCanteen logo" class="logo d-block mx-auto">
                    <h3 class="text-center logincolor2">Login</h3>
                    <p class="text-center">Please log in to continue.</p>
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address:</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter email">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                        </div>
                        <div class="mb-3 form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-warning d-block mx-auto loginbtn">Login</button>
                        <div class="text-center mt-3">
                            <p>Don't have an account? <a href="register.html" class="registercolor">Register</a></p>
                            <a href="forgot.html" class="forgotcolor">Forgot Password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
