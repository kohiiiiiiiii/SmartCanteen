<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartCanteen - Manager Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/index_manager.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
      <img src="../assets/img/smartcanteenLogo.png" alt="SmartCanteen logo" class="logo d-block mx-auto">
  <a href="index.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="menu.html"><i class="bi bi-journal-text"></i> Manage Menu</a>
  <a href="orders.html"><i class="bi bi-receipt"></i> Orders</a>
  <a href="inventory.html"><i class="bi bi-box-seam"></i> Inventory</a>
  <a href="../customer/index.html" class="logout"><i class="bi bi-box-arrow-right"></i> Go Home</a>
</div>

<!-- Content -->
<div class="content">
  <!-- Topbar -->
  <div class="topbar">
    <h5>Welcome back, <span id="managerName"></span></h5>
    <i class="bi bi-bell-fill fs-4 text-secondary"></i>
  </div>

  <!-- Dashboard Stats -->
  <div class="row mt-4 g-4">
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>📦 Inventory Items</h6>
        <h3>128</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>🛒 Pending Orders</h6>
        <h3>45</h3>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-custom text-center p-4">
        <h6>💰 Sales Today</h6>
        <h3>₱3,240</h3>
      </div>
    </div>
  </div>

  <!-- Quick Overview Table -->
  <div class="card card-custom mt-4">
    <div class="card-header bg-warning text-dark fw-bold">
      Recent Orders
    </div>
    <div class="card-body">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Meal</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>101</td>
            <td>Burger</td>
            <td>Juan Dela Cruz</td>
            <td><span class="badge bg-warning text-dark">Pending</span></td>
            <td>11:20 AM</td>
          </tr>
          <tr>
            <td>102</td>
            <td>Chicken w/ Rice</td>
            <td>Maria Santos</td>
            <td><span class="badge bg-success">Completed</span></td>
            <td>11:45 AM</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // Load manager name from session/localStorage
  document.getElementById("managerName").textContent = localStorage.getItem("first_name") || "Manager";
</script>
</body>
</html>
