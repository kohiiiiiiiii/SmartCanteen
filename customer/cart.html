<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCanteen - My Cart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/navbar.css">
  <link rel="stylesheet" href="../assets/css/index.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a href="index.html" class="nav-link active">
      <img src="../assets/img/smartcanteenLogo.png" alt="SmartCanteen logo" class="logo">
    </a>
    <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between gap-3" id="navbarCollapse">
      <div class="navbar-nav gap-5 w-100 padding">
        <a href="index.html" class="nav-link homecolor">Home</a>
        <a href="about.html" class="nav-link aboutcolor">About</a>
      </div>

      <div class="navbar-nav position-relative d-flex align-items-center gap-3">
        <a href="#" class="nav-link" id="notifBell" data-bs-toggle="dropdown">
          <i class="bi bi-bell-fill color icon-large"></i>
        </a>
        <a href="profile.html" class="nav-link" id="profileIcon">
          <i class="bi bi-person-circle color icon-large"></i>
        </a>
        <a href="cart.html" class="nav-link" id="cartIcon">
          <i class="bi bi-cart-fill color icon-large"></i>
        </a>

        <div class="dropdown-menu dropdown-menu-end p-3" aria-labelledby="notifBell">
          <h6 class="dropdown-header notifcolor">Notifications</h6>
          <hr>
        </div>

        <!-- Auth Links -->
        <a href="../login.html" class="nav-link logincolor loginbg login-link">Login</a>
        <a href="../register.html" class="nav-link registercolorr registerbg register-link">Register</a>
        <a href="#" class="nav-link logincolor loginbg logout-link" style="display:none;">Logout</a>
      </div>
    </div>
  </div>
</nav>

<section class="hero bg-light text-center py-5 mb-4 welcomesection">
  <div class="container">
    <h1 class="display-4 welcometexttitle">🛒 My Cart</h1>
    <p class="lead welcometext">Review your selected meals before checkout.</p>
  </div>
</section>

<div class="container mb-5">
  <div class="row">
    <div class="col-lg-8">
      <ul class="list-group shadow-sm">
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <img src="../assets/img/burger.png" alt="Burger" class="me-3" style="width:60px; height:60px; object-fit:cover; border-radius:10px;">
            <div>
              <h6 class="mb-1">Burger</h6>
              <small class="text-muted">Add-ons: Cheese, Bacon</small>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3">
            <span class="fw-bold">₱85</span>
            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
          </div>
        </li>


      </ul>
    </div>

    <div class="col-lg-4 mt-4 mt-lg-0">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title">Summary</h5>
          <hr>
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span>₱85</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Service Fee</span>
            <span>₱5</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-3 fw-bold">
            <span>Total</span>
            <span>₱90</span>
          </div>
          <button class="btn btn-warning w-100">Proceed to Checkout</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Auth Handling
  const loginLink = document.querySelector(".login-link");
  const registerLink = document.querySelector(".register-link");
  const logoutLink = document.querySelector(".logout-link");

  if(localStorage.getItem("first_name")){
    loginLink.style.display = "none";
    registerLink.style.display = "none";
    logoutLink.style.display = "inline";
  }

  logoutLink.addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "login.html";
  });
</script>

</body>
</html>
