    <a href="index.html" class="nav-link active"><img src="assets/img/smartcanteen_logo.png" alt="SmartCanteen logo" class="logo"></a>
    <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
      <div class="navbar-nav gap-5 w-100 padding">
        <a href="index.html" class="nav-link homecolor">Home</a>
        <a href="#" class="nav-link profilecolor">Profile</a>

        <a href="#" class="nav-link" id="notifBell" data-bs-toggle="dropdown" aria-expanded="false">

<div class="register d-flex justify-content-center align-items-center vh-200">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card p-4">
                    <img src="assets/img/smartcanteen_logo.png" alt="SmartCanteen logo" class="logo d-block mx-auto">
                    <h3 class="text-center registercolor">Create an Account</h3>
                    <form action="register.php" method="POST">
                        <div class="mb-3">
                            <label for="first-name" class="form-label">First Name:</label>
                            <input type="text" class="form-control" name="first_name" id="first-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="middle-name" class="form-label">Middle Name:</label>
                            <input type="text" class="form-control" name="middle_name" id="middle-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="last-name" class="form-label">Last Name:</label>
                            <input type="text" class="form-control" name="last_name" id="last-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address:</label>
                            <input type="email" class="form-control" name="email" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" class="form-control" name="password" id="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">Register as</label>
                            <select class="form-select" name="role" id="role" required>
                                <option value="">Select Role</option>
                                <option value="student">Student</option>
                                <option value="staff">Staff</option>
                                <option value="manager">Canteen Manager</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning d-block mx-auto registerbtn">Register</button>
                    </form>
                    <div class="text-center mt-3">
                        <p>Already have an account? <a href="login.html" class="registercolor">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
